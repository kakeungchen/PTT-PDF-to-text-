<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#13161F"/>
      <stop offset="1" stop-color="#0B0D13"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3EE6FF"/>
      <stop offset="0.55" stop-color="#5B8CFF"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3EE6FF"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.32" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#5B8CFF" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#5B8CFF" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#5B8CFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 tile -->
  <rect x="32" y="32" width="960" height="960" rx="224" fill="url(#bg)"/>
  <rect x="32" y="32" width="960" height="960" rx="224" fill="url(#glow)"/>
  <rect x="33.5" y="33.5" width="957" height="957" rx="222.5" fill="none"
        stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="3"/>

  <!-- 文档页：渐变描边 + 折角 -->
  <g fill="none" stroke="url(#acc)" stroke-width="46" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 268 236
             L 268 788
             Q 268 812 292 812 L 478 812
             M 268 236 Q 268 212 292 212 L 462 212"/>
    <path d="M 462 212 L 560 310 L 560 392" stroke-width="44"/>
  </g>

  <!-- 页内文字行（静态短行） -->
  <g stroke="#A9B4C8" stroke-opacity="0.85" stroke-width="34" stroke-linecap="round">
    <line x1="356" y1="402" x2="470" y2="402"/>
  </g>

  <!-- 三行文字向右飞出：长度递减、透明度递减，传达"转换/流动" -->
  <g stroke="url(#acc2)" stroke-width="46" stroke-linecap="round">
    <line x1="356" y1="524" x2="756" y2="524"/>
    <line x1="356" y1="646" x2="660" y2="646" stroke-opacity="0.75"/>
    <line x1="356" y1="768" x2="560" y2="768" stroke-opacity="0.5"/>
  </g>
  <!-- 飞出端的光点 -->
  <circle cx="756" cy="524" r="23" fill="#3EE6FF"/>
  <circle cx="816" cy="524" r="14" fill="#5B8CFF" fill-opacity="0.8"/>
  <circle cx="862" cy="524" r="8" fill="#A855F7" fill-opacity="0.6"/>
</svg>
